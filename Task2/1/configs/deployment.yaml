apiVersion: apps/v1
kind: Deployment
metadata:
  name: laksan-deployment
  labels:
    app: laksan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laksan
  template:
    metadata:
      labels:
        app: laksan
    spec:
      containers:
        - name: laksan
          image: shestera/scaletestapp:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "30Mi"
            requests:
              memory: "20Mi"
