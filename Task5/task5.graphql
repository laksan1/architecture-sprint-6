# Запросы (Queries)
type Query {
  # Запрос на получение информации о клиенте
  client(id: ID!): Client
}

# Тип данных клиента
type Client {
  id: ID!
  name: String
  age: Int
  documents: [Document] # Список документов клиента
  relatives: [Relative] # Список родственников клиента
}

# Тип данных документа
type Document {
  id: ID!
  type: String
  number: String
  issueDate: String
  expiryDate: String
}

# Тип данных родственника
type Relative {
  id: ID!
  relationType: String
  name: String
  age: Int
}

# Пример 1: получаем только данные о клиенте
query {
  client(id: "123") {
    id
    name
    age
  }
}

# Пример 2: получаем данные о клиенте и его документах
query {
  client(id: "123") {
    id
    name
    documents {
      id
      type
      number
    }
  }
}

# Пример 3: получаем данные о клиенте и его родственниках
query {
  client(id: "123") {
    id
    name
    relatives {
      id
      relationType
      name
    }
  }
}
